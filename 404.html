<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth Floating Animation for 404 Text */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Continuous Glowing Pulse for the Button */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 15px 0px rgba(147, 51, 234, 0.4); }
            50% { box-shadow: 0 0 35px 10px rgba(147, 51, 234, 0.7); }
        }
        .animate-glow {
            animation: glow 2.5s infinite;
        }

        /* Moving Background Gradient */
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient-bg {
            background-size: 200% 200%;
            animation: gradient-move 10s ease infinite;
        }
    </style>
</head>
<body class="animate-gradient-bg bg-gradient-to-br from-indigo-100 via-white to-pink-100 min-h-screen flex items-center justify-center px-4 font-sans">
    
    <div class="max-w-xl w-full text-center p-10 sm:p-14 bg-white/70 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-white/50">
        
        <h1 class="text-9xl sm:text-[10rem] font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-pink-500 to-orange-400 drop-shadow-xl animate-float leading-none pb-4">
            404
        </h1>
        
        <h2 class="mt-4 text-3xl sm:text-4xl font-black text-gray-800 tracking-tight">
            Lost in Space?
        </h2>
        <p class="mt-4 text-gray-500 text-lg leading-relaxed">
            The page you're looking for has drifted out of orbit. Let's get you back home safely.
        </p>
        
        <div class="mt-10 flex justify-center">
            <a href="/" class="group relative px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-500 text-white text-lg font-bold rounded-full overflow-hidden transition-transform duration-300 hover:scale-105 animate-glow">
                <div class="absolute inset-0 bg-white/20 group-hover:translate-x-full transition-transform duration-500 -translate-x-full ease-out skew-x-12"></div>
                
                <span class="relative flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transition-transform group-hover:-translate-y-1 group-hover:scale-110 duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Back to Homepage
                </span>
            </a>
        </div>

    </div>

</body>
</html>
